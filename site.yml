---
- hosts: all
  become: true
  tasks:
    - name: install updates for ubuntu
      tags: always
      ansible.builtin.apt:
        upgrade: dist
        update_cache: yes
      when: ansible_distribution == "Ubuntu"

    - name: install updates for fedora
      tags: always
      ansible.builtin.dnf:
        use_backend: dnf4
        update_only: yes
        update_cache: yes
        state: latest
      when: ansible_distribution == "Fedora"

- hosts: web_servers
  become: true
  tasks:
    - name: install apache on web servers
      tags: apache,ubuntu
      ansible.builtin.apt:
        name:
          - apache2
          - libapache2-mod-php
        state: present

    - name: copy html file for site
      tags: apache,ubuntu
      ansible.builtin.copy:
        src: default_site.html
        dest: /var/www/html/index.html
        owner: root
        group: root
        mode: 0644

- hosts: db_servers
  become: true
  tasks:
    - name: install mariadb package on db servers
      tags: db,fedora
      ansible.builtin.dnf:
        name: mariadb-server
        use_backend: dnf4
        state: latest
      when: ansible_distribution == "Fedora"
