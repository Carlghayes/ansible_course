---
- hosts: all
  become: true
  tasks:
    - name: install updates for ubuntu
      ansible.builtin.apt:
        upgrade: dist
        update_cache: yes
      when: ansible_distribution == "Ubuntu"

    - name: install updates for fedora
      ansible.builtin.dnf:
        use_backend: dnf4
        update_only: yes
        update_cache: yes
        state: latest
      when: ansible_distribution == "Fedora"

- hosts: web_servers
  become: true
  tasks:
    - name: install apache on web servers
      ansible.builtin.apt:
        name:
          - apache2
          - libapache2-mod-php
        state: present

- hosts: db_servers
  become: true
  tasks:
    - name: install mariadb package on db servers
      ansible.builtin.dnf:
        name: mariadb-server
        use_backend: dnf4
        state: latest
      when: ansible_distribution == "Fedora"
